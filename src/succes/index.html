<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Compose craft next</title>
    <link rel="icon" href="../favicon.ico" type="image/x-icon" sizes="256x256">
    <meta name="description" content="Compose craft next. The only visual tool to self host" />
    <meta name="author" content="Daily Dev Tips" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  </head>
  <body class="flex flex-col min-h-[100svh] bg-slate-50 gap-5">
    <section class="min-h-[100svh] flex flex-col justify-center items-center">
      <p class="text-2xl text-center font-bold text-dark">You have been added to the waitlist !</p>
      <p>You also can join our discord here :</p>
      <a class="mt-10" href="https://discord.com/invite/GBxRWQa6Dw">
        <img class="w-14" src="discord.png" alt="discord">
      </a>
    </section>
    <footer class="flex justify-center py-5 px-2">
      <p>Composecraft next is a product of <a class="underline" href="https://entrecompetents.fr">SARL ENTRECOMPETENS</a></p>
    </footer>
    <script>
      window.onload = function() {
        // Lancer les confettis pendant 5 secondes
        const duration = 100;
        const end = Date.now() + duration;

        function lancerConfettis() {
          const timeLeft = end - Date.now();
          if (timeLeft <= 0) return;

          // Générer des confettis à gauche et à droite de la page
          confetti({
            particleCount: 100,
            spread: 90,
            origin: { x: 0, y: Math.random() }, // Confettis depuis la gauche
            angle: 90, // Angle pour la dispersion à droite
          });

          confetti({
            particleCount: 100,
            spread: 90,
            origin: { x: 1, y: Math.random() }, // Confettis depuis la droite
            angle: 90, // Angle pour la dispersion à gauche
          });

          // Relancer la fonction jusqu'à ce que le temps soit écoulé
          if (timeLeft > 0) {
            requestAnimationFrame(lancerConfettis);
          }
        }

        lancerConfettis();
      }
    </script>
  </body>
</html>
